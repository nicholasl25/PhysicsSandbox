<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gravity 3D Simulation</title>
    <link rel="stylesheet" href="gravity3d.css">
</head>
<body>
    <div id="app-container">
        <div id="canvas-container"></div>
        <div id="control-panel">
            <div id="control-tabs">
                <button class="tab-button active" data-tab="add">Add</button>
                <button class="tab-button" data-tab="inspect">Inspect</button>
                <button class="tab-button" data-tab="settings">Settings</button>
            </div>
            
            <div id="add-panel" class="tab-content active">
                <div class="control-group">
                    <label>Name (optional):</label>
                    <input type="text" id="name-field" placeholder="Leave empty for auto-naming">
                </div>
                
                <div class="control-group">
                    <label>Mass:</label>
                    <div class="number-unit-row">
                        <input type="number" id="mass-field" value="1" step="0.1">
                        <select id="mass-unit">
                            <option value="kg">kg</option>
                            <option value="Moon">Moon</option>
                            <option value="Earth">Earth</option>
                            <option value="Jupiter">Jupiter</option>
                            <option value="Sun">Sun</option>
                        </select>
                    </div>
                </div>
                
                <div class="control-group">
                    <label>Radius:</label>
                    <div class="number-unit-row">
                        <input type="number" id="radius-field" value="1" step="0.1">
                        <select id="radius-unit">
                            <option value="m">m</option>
                            <option value="mi">mi</option>
                            <option value="Moon">Moon</option>
                            <option value="Earth">Earth</option>
                            <option value="Jupiter">Jupiter</option>
                            <option value="Sun">Sun</option>
                            <option value="au">au</option>
                        </select>
                    </div>
                </div>
                
                <div class="control-group collapsible">
                    <div class="collapsible-header" onclick="toggleAdvanced()">
                        <span>▶ Advanced Settings</span>
                    </div>
                    <div class="collapsible-content" id="advanced-content">
                        <div class="control-group">
                            <label>Period of Rotation (T):</label>
                            <input type="number" id="period-field" value="100.0" step="0.1">
                        </div>
                        
                        <div class="control-group">
                            <label>Temperature (K):</label>
                            <input type="number" id="temperature-field" value="300.0" step="0.1">
                        </div>
                    </div>
                </div>
                
                <button id="add-planet-button" class="primary-button">Add Planet</button>
            </div>
            
            <div id="inspect-panel" class="tab-content">
                <div id="inspect-detail" class="inspect-detail" style="display: none;">
                    <div class="inspect-image-wrap">
                        <img id="inspect-image" src="" alt="" class="inspect-image">
                    </div>
                    <div id="inspect-fields" class="inspect-fields"></div>
                </div>
                <div id="inspect-list-wrap" class="inspect-list-wrap">
                    <div id="inspect-list" class="inspect-list"></div>
                </div>
            </div>
            
            <div id="settings-panel" class="tab-content">
                <div class="control-group">
                    <label>G: <span id="gravity-value">100</span>% of real</label>
                    <input type="range" id="gravity-slider" min="0" max="300" value="100" step="1">
                </div>
                <div class="control-group">
                    <label>c: <span id="speed-of-light-value">100</span>% of real</label>
                    <input type="range" id="speed-of-light-slider" min="0" max="300" value="100" step="1">
                </div>
                <div class="control-group">
                    <label>σ: <span id="sigma-value">100</span>% of real</label>
                    <input type="range" id="sigma-slider" min="0" max="300" value="100" step="1">
                </div>
                <div class="control-group">
                    <label>Time Factor: <span id="timefactor-value">1.00</span></label>
                    <input type="range" id="timefactor-slider" min="0" max="300" value="100" step="1">
                </div>
                
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="bounce-checkbox">
                        Bounce
                    </label>
                </div>
                
                <div class="control-group">
                    <label>
                        <input type="checkbox" id="rk4-checkbox">
                        RK4 Integration
                    </label>
                </div>
            </div>
            
            <div id="control-footer">
                <button id="clear-button" class="danger-button">Clear Simulation</button>
                <div id="pause-indicator">
                    <span id="pause-text">Press SPACE to pause</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Three.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <!-- Physics engine -->
    <script src="physics/Vector.js"></script>
    <script src="physics/State.js"></script>
    <script src="physics/Planet.js"></script>
    
    <!-- Simulation -->
    <script src="gravity3d.js"></script>
    
    <!-- UI Controller -->
    <script src="gravity3d-ui.js"></script>
</body>
</html>
